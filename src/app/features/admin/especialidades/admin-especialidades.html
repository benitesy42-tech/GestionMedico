<div>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="fw-bold mb-0">Especialidades</h5>
    <button class="btn btn-primary" (click)="openNew()">+ Nueva Especialidad</button>
  </div>

  @if (showForm()) {
    <div class="card border-0 shadow-sm mb-4">
      <div class="card-body">
        <div class="row g-3 align-items-end">
          <div class="col-md-6">
            <label class="form-label">Nombre de Especialidad</label>
            <input class="form-control" [(ngModel)]="nombre" placeholder="Ej: Cardiología" />
          </div>
          <div class="col-md-auto d-flex gap-2">
            <button class="btn btn-primary" (click)="save()" [disabled]="loading() || !nombre().trim()">
              {{ editing() ? 'Actualizar' : 'Guardar' }}
            </button>
            <button class="btn btn-secondary" (click)="cancelForm()">Cancelar</button>
          </div>
        </div>
      </div>
    </div>
  }

  <div class="card border-0 shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr><th>Nombre</th><th>Acciones</th></tr>
        </thead>
        <tbody>
          @for (e of especialidades(); track e.ID_Especialidad) {
            <tr>
              <td>{{ e.Nombre_Especialidad }}</td>
              <td>
                <button class="btn btn-sm btn-outline-primary me-1" (click)="openEdit(e)">✏️</button>
                <button class="btn btn-sm btn-outline-danger" (click)="delete(e.ID_Especialidad)">🗑️</button>
              </td>
            </tr>
          } @empty {
            <tr><td colspan="2" class="text-center py-4 text-muted">No hay especialidades registradas</td></tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
