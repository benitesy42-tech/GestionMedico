<div>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="fw-bold mb-0">Registro de Pagos</h5>
    <button class="btn btn-primary" (click)="openNew()">+ Nuevo Pago</button>
  </div>

  @if (showForm()) {
    <div class="card border-0 shadow-sm mb-4">
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">ID Consulta</label>
            <input type="number" class="form-control" [(ngModel)]="form.ID_Consulta" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Monto ($)</label>
            <input type="number" step="0.01" class="form-control" [(ngModel)]="form.Monto" />
          </div>
        </div>
        <div class="mt-3 d-flex gap-2">
          <button class="btn btn-primary" (click)="save()" [disabled]="loading()">Registrar</button>
          <button class="btn btn-secondary" (click)="cancelForm()">Cancelar</button>
        </div>
      </div>
    </div>
  }

  <div class="card border-0 shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr><th>#</th><th>ID Consulta</th><th>Monto</th><th>Fecha</th><th>Estado</th><th>Acción</th></tr>
        </thead>
        <tbody>
          @for (p of pagos(); track p.ID_Pago) {
            <tr>
              <td>{{ p.ID_Pago }}</td>
              <td>{{ p.ID_Consulta }}</td>
              <td>${{ formatMonto(p.Monto) }}</td>
              <td>{{ p.Fecha_Pago }}</td>
              <td>
                <span class="badge" [class.bg-success]="p.Estado_Pago === 'Completado'" [class.bg-danger]="p.Estado_Pago === 'Anulado'">
                  {{ p.Estado_Pago }}
                </span>
              </td>
              <td>
                @if (p.Estado_Pago === 'Completado') {
                  <button class="btn btn-sm btn-outline-danger" (click)="anular(p.ID_Pago)">Anular</button>
                }
              </td>
            </tr>
          } @empty {
            <tr><td colspan="6" class="text-center py-4 text-muted">No hay pagos registrados</td></tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
