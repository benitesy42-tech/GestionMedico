<div>
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="fw-bold mb-0">Pacientes</h5>
    <button class="btn btn-primary" (click)="openNew()">+ Nuevo Paciente</button>
  </div>

  <div class="input-group mb-3">
    <input class="form-control" placeholder="Buscar por DNI o Nombre..." [(ngModel)]="searchTerm" (keyup.enter)="search()" />
    <button class="btn btn-outline-secondary" (click)="search()">🔍</button>
  </div>

  @if (showForm()) {
    <div class="card border-0 shadow-sm mb-4">
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">DNI</label>
            <input class="form-control" [(ngModel)]="form.DNI" name="dni" required />
          </div>
          <div class="col-md-4">
            <label class="form-label">Nombres</label>
            <input class="form-control" [(ngModel)]="form.Nombres" name="nombres" required />
          </div>
          <div class="col-md-4">
            <label class="form-label">Apellidos</label>
            <input class="form-control" [(ngModel)]="form.Apellidos" name="apellidos" required />
          </div>
          <div class="col-md-4">
            <label class="form-label">Teléfono</label>
            <input class="form-control" [(ngModel)]="form.Telefono" name="telefono" />
          </div>
          <div class="col-md-4">
            <label class="form-label">Fecha Nacimiento</label>
            <input type="date" class="form-control" [(ngModel)]="form.Fecha_Nacimiento" name="fechaNac" />
          </div>
        </div>
        <div class="mt-3 d-flex gap-2">
          <button class="btn btn-primary" (click)="save()" [disabled]="loading()">Guardar</button>
          <button class="btn btn-secondary" (click)="cancelForm()">Cancelar</button>
        </div>
      </div>
    </div>
  }

  <div class="card border-0 shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr><th>#</th><th>DNI</th><th>Nombre</th><th>Teléfono</th><th>Acciones</th></tr>
        </thead>
        <tbody>
          @for (p of pacientes(); track p.ID_Paciente) {
            <tr>
              <td>{{ p.ID_Paciente }}</td>
              <td>{{ p.DNI }}</td>
              <td>{{ p.Nombres }} {{ p.Apellidos }}</td>
              <td>{{ p.Telefono || '-' }}</td>
              <td><button class="btn btn-sm btn-outline-primary" (click)="openEdit(p)">✏️</button></td>
            </tr>
          } @empty {
            <tr><td colspan="5" class="text-center py-4 text-muted">No hay pacientes</td></tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
