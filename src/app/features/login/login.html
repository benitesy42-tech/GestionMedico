<div class="min-vh-100 d-flex align-items-center justify-content-center p-3" style="background: linear-gradient(135deg, #0c4a6e 0%, #0284c7 50%, #38bdf8 100%); position: relative; overflow: hidden;">
  <div style="position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.05) 0%, transparent 50%); pointer-events: none;"></div>
  <div class="card shadow-lg border-0" style="max-width: 420px; width: 100%; border-radius: 20px;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <div class="d-inline-flex align-items-center justify-content-center mb-3" style="width: 72px; height: 72px; background: linear-gradient(135deg, #0c4a6e, #0284c7); border-radius: 18px;">
          <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
          </svg>
        </div>
        <h4 class="fw-bold" style="color: #0c4a6e;">SGCM</h4>
        <p class="text-muted small">Sistema de Gestión de Consultas Médicas</p>
      </div>

      @if (error()) {
        <div class="alert alert-danger d-flex align-items-center gap-2 py-2 rounded-3 border-0" role="alert">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="flex-shrink-0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span>{{ error() }}</span>
        </div>
      }

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <div class="mb-3">
          <label class="form-label fw-semibold small" for="email">Usuario / Correo</label>
          <div class="input-group">
            <span class="input-group-text border-end-0 bg-white">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6c757d" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input
              id="email"
              type="text"
              class="form-control border-start-0 ps-0"
              placeholder="Ingrese su usuario o correo"
              [(ngModel)]="model.Username_Correo"
              name="Username_Correo"
              required
              autocomplete="username"
            />
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold small" for="password">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text border-end-0 bg-white">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6c757d" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input
              id="password"
              type="password"
              class="form-control border-start-0 ps-0"
              placeholder="Ingrese su contraseña"
              [(ngModel)]="model.Password"
              name="Password"
              required
              autocomplete="current-password"
            />
          </div>
        </div>

        <button
          type="submit"
          class="btn w-100 py-2 fw-semibold text-white border-0"
          style="background: linear-gradient(135deg, #0c4a6e, #0284c7); border-radius: 10px;"
          [disabled]="loginForm.invalid || loading()"
        >
          @if (loading()) {
            <span class="spinner-border spinner-border-sm me-2" role="status"></span>
          }
          {{ loading() ? 'Ingresando...' : 'Iniciar Sesión' }}
        </button>
      </form>

      <div class="text-center mt-4">
        <small class="text-muted">¿No tienes cuenta? Contacta al administrador</small>
      </div>
    </div>
  </div>
</div>
